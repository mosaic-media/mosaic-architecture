site_name: Mosaic
site_description: Mosaic architecture and direction.
site_url: https://mosaic-media.github.io/mosaic-architecture/

repo_name: mosaic-media/mosaic-architecture
repo_url: https://github.com/mosaic-media/mosaic-architecture
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  logo: assets/mosaic-icon-dark.png
  favicon: assets/mosaic-icon-dark.png
  icon:
    repo: fontawesome/brands/github
  features:
    - content.code.copy
    - navigation.footer
    - navigation.top
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Mosaic: index.md
  - Architecture: architecture.md
  - Roadmap: roadmap.md
  - Decisions:
      - 1. Transactional store extensibility: adr/0001-transactional-store-extensibility.md
      - 2. Module storage and delivery: adr/0002-module-storage-and-delivery-model.md
      - 3. Platform as execution kernel: adr/0003-platform-as-execution-kernel.md
      - 4. Supervisor as host manager: adr/0004-supervisor-as-host-manager.md
      - 5. Supervisor guarantees an interface: adr/0005-supervisor-guarantees-an-interface.md
      - 6. Supervisor orchestrates isolated builds: adr/0006-supervisor-orchestrates-isolated-builds.md
      - 7. Static Go module composition: adr/0007-static-go-module-composition.md
      - 8. SDK as public contract language: adr/0008-sdk-as-public-contract-language.md
      - 9. Developer Platform toolchain: adr/0009-developer-platform-toolchain.md
      - 10. Test Harness as development modules: adr/0010-test-harness-as-development-modules.md
      - 11. Platform transports events: adr/0011-platform-transports-events.md
      - 12. Capabilities do not own stores: adr/0012-capabilities-do-not-own-stores.md
      - 13. The object graph: adr/0013-object-graph.md
      - 14. Storage authority and transaction scope: adr/0014-storage-authority-and-transaction-scope.md
      - 15. Open and closed vocabularies: adr/0015-open-and-closed-vocabularies.md
      - 16. The published contract surface: adr/0016-published-contract-surface.md
      - 17. How a capability acts: adr/0017-how-a-capability-acts.md
      - 18. First-administrator bootstrap: adr/0018-first-admin-bootstrap.md
      - 19. Module capability and invocation: adr/0019-module-capability-and-invocation.md
      - 20. Optional-module composition: adr/0020-optional-module-composition.md
      - 21. User-managed module settings: adr/0021-module-settings.md
      - 22. Licensing: adr/0022-licensing.md
      - 23. Server-Driven UI and the Shell: adr/0023-server-driven-ui-and-the-shell.md
      - 24. Primitives and definitions: adr/0024-primitives-and-definitions.md
      - 25. The SDUI contract repository: adr/0025-sdui-contract-repository.md
      - 26. The React SDUI runtime: adr/0026-react-sdui-runtime.md
      - 27. Modules as typed capability providers: adr/0027-modules-as-typed-capability-providers.md
      - 28. Virtual browse and materialized library: adr/0028-virtual-and-materialized-content.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  # Mermaid diagrams render natively through Material's superfences.
  # A ```mermaid block becomes a rendered diagram; no plugin required.
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - path: assets/js/mermaid-init.js
    type: module

plugins:
  - search
